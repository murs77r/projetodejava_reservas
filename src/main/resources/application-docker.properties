# Configuracao usada apenas quando rodar no Docker
# Repare que o host do banco e o nome do servico no compose: db
spring.datasource.url=jdbc:mysql://db:3306/reservas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mantem o comportamento simples de atualizar tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
