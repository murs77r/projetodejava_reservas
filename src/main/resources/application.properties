# Nome da aplicação (apenas organização)
spring.application.name=sistema-reservas

# Configuração de conexão com o banco MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/reservas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Driver JDBC do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Atualiza as tabelas automaticamente com base nas entidades
spring.jpa.hibernate.ddl-auto=update

# Mostra comandos SQL no console (útil para estudo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
