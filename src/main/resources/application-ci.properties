# Perfil usado no GitHub Actions para subir a aplicacao sem MySQL externo.
spring.datasource.url=jdbc:h2:mem:reservas_ci;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Mantem schema disponivel para o ciclo de execucao dos testes E2E.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
