# Configuração usada quando rodar em Docker ou em deploy com variáveis de ambiente
# Se SPRING_DATASOURCE_URL estiver definida, ela sobrescreve o valor padrão abaixo.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/reservas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mantem o comportamento simples de atualizar tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=${PORT:8080}
